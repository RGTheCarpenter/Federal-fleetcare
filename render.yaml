services:
  - type: web
    name: fleetcare-web
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PGSSLMODE
        value: require
      - key: COOKIE_SECURE
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: fleetcare-db
          property: connectionString

databases:
  - name: fleetcare-db
    plan: basic-256mb
    region: oregon
    ipAllowList: []
